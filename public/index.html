<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Zorvyn Finance Dashboard - API Docs</title>
  <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.15.5/swagger-ui.css">
</head>

<body>
  <div id="swagger-ui"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.15.5/swagger-ui-bundle.js"> </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"> </script>
  <script>
    const spec = `
openapi: 3.0.0
info:
  title: Zorvyn Finance Tracker API
  version: 1.0.0
  description: Robust API Documentation serving the Zorvyn Dashboard. 
    Global rate limiting restricts loads to 25req/min. 
    Strict Role-Based Access Control governs route accessibility mapping out to viewer, analyst, and admin roles correctly avoiding horizontal privilege climbing!
servers:
  - url: http://localhost:7878
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /authentication/sign-in:
    post:
      summary: Sign in and receive JWT token
      security: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Returns an Access Token encoded securely.

  /dashboard/recent:
    get:
      summary: Recent Activity
      description: Roles - viewer, analyst, admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns recent transactions summary
  /dashboard/summary:
    get:
      summary: Dashboard Summary
      description: Roles - viewer, analyst, admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns overall balances
  /dashboard/trends:
    get:
      summary: View Monthly Trends
      description: Roles - analyst, admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: year
          schema:
            type: integer
          required: false
      responses:
        '200':
          description: Returns historical charting trends
          
  /dashboard/by-category:
    get:
      summary: View Analytics By Category
      description: Roles - analyst, admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns detailed categorical metric aggregations
          
  /transaction:
    get:
      summary: Get all transactions
      description: Roles - analyst, admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns paginated transactions mapping.
    post:
      summary: Create new transaction
      description: Roles - admin
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [amount, transaction_date, status, category_id, counterparty_id, created_by]
              properties:
                amount:
                  type: number
                transaction_date:
                  type: string
                  format: date
                  description: "YYYY-MM-DD"
                status:
                  type: string
                  enum: [pending, completed, failed, cancelled]
                  description: "Transaction state"
                category_id:
                  type: integer
                counterparty_id:
                  type: integer
                created_by:
                  type: integer
                  description: "ID of processing Admin User. Explicitly required mapping to internal table constraint."
      responses:
        '200':
          description: Validates and securely creates new transaction
          
  /transaction/{id}:
    get:
      summary: Get Transaction by ID
      description: Roles - analyst, admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Record Details
    patch:
      summary: Update Transaction
      description: Roles - admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                amount:
                  type: number
                status:
                  type: string
                  enum: [pending, completed, failed, cancelled]
      responses:
        '200':
          description: Action Accepted
    delete:
      summary: Delete Transaction
      description: Roles - admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted System
          
  /categories:
    get:
      summary: All Categories
      description: Roles - admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Arrays Categories mapped
    post:
      summary: Insert Category
      description: Roles - admin
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name, category_type]
              properties:
                name:
                  type: string
                category_type:
                  type: string
                  enum: [income, expenses]
                  description: Select income or expenses correctly matching database constraint!
                description:
                  type: string
      responses:
        '200':
          description: Pushed category config
  /categories/{id}:
    get:
      summary: Get Single Category
      description: Roles - admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Object Returned
    patch:
      summary: Update Category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                category_type:
                  type: string
                  enum: [income, expenses]
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete Category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted

  /counter-parties:
    get:
      summary: System entities mapping
      description: Roles - admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mapping returned
    post:
      summary: Create Entity
      description: Roles - admin
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name, party_type]
              properties:
                name:
                  type: string
                party_type:
                  type: string
                  enum: [vendor, contractor, employee, client]
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Created
  /counter-parties/{id}:
    patch:
      summary: Update Counter-Party
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                party_type:
                  type: string
                  enum: [vendor, contractor, employee, client]
      responses:
        '200':
          description: Processed
    delete:
      summary: Delete Entity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Unlinked Successfully

  /users:
    post:
      summary: Create System User
      description: Roles - admin
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name, email, password, role, status]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, viewer, analyst]
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: Created
  /users/{id}:
    patch:
      summary: Update User
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, viewer, analyst]
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: Updated
  /users/get-all-users:
    get:
      summary: View All App Users
      description: Roles Allowed - admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Retrieves User Schema mapping and roles.
`;
    window.onload = function () {
      SwaggerUIBundle({
        spec: jsyaml.load(spec),
        dom_id: '#swagger-ui',
      });
    };
  </script>
</body>

</html>
